specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Wikidata
providerId: wikidata
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Knowledge Graph
  - Linked Data
  - Open Data
  - Semantic Web
  - SPARQL
  - Wikipedia
description: Wikidata is a free, CC0-licensed knowledge base operated by the Wikimedia Foundation. All public APIs (Wikibase REST, MediaWiki Action, SPARQL Query Service, Linked Data interface, Recent Changes event stream) are free of charge with no paid tiers. Heavy or commercial users are expected to follow the User-Agent and maxlag policies, mirror data via the database dumps, or contract with Wikimedia Enterprise for commercial-grade access.
sources:
  - https://www.wikidata.org/wiki/Wikidata:Data_access
  - https://meta.wikimedia.org/wiki/User-Agent_policy
  - https://dumps.wikimedia.org
  - https://enterprise.wikimedia.com
plans:
  - id: wikidata-public
    name: Public Free Access
    type: freemium
    description: All Wikidata APIs are publicly accessible at zero cost under the CC0 license. Use is governed by the Wikimedia User-Agent policy, robot policy, and global rate limits; abusive traffic is rate-limited or blocked, and bulk consumers should prefer the database dumps.
    entries:
      - label: API Access
        name: api_access
        type: flat
        metric: request
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Data License
        name: data_license
        type: flat
        metric: dataset
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: 'CC0 - No rights reserved'
        userMultiplied: false
    elements:
      - name: Wikibase REST API
      - name: MediaWiki Action API
      - name: SPARQL Query Service (query.wikidata.org)
      - name: Linked Data Interface
      - name: Recent Changes Event Stream
      - name: Database Dumps
      - name: Compliance with User-Agent and maxlag policies required
  - id: wikidata-enterprise
    name: Wikimedia Enterprise
    type: enterprise
    description: Commercial-grade access to Wikimedia content (including Wikidata) via the Wikimedia Enterprise product - SLA-backed APIs, on-demand snapshots, and structured-content feeds. Pricing is contract-driven and separate from the free public APIs.
    entries:
      - label: Enterprise Access
        name: enterprise_access
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Wikimedia Enterprise SLA-backed APIs
      - name: On-Demand Snapshots
      - name: Structured Content Feeds
      - name: Commercial Support
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
