naftiko: 1.0.0-alpha2
info:
  label: Wikidata REST API & MediaWiki API — Items
  description: 'Wikidata REST API & MediaWiki API — Items. 3 operations. Lead operation: Wikidata Create a New Wikidata Item.
    Self-contained Naftiko capability covering one Wikidata business surface.'
  tags:
  - Wikidata
  - Items
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WIKIDATA_API_KEY: WIKIDATA_API_KEY
capability:
  consumes:
  - type: http
    namespace: mediawiki-items
    baseUri: https://www.wikidata.org/w/rest.php/wikibase/v0
    description: Wikidata REST API & MediaWiki API — Items business capability. Self-contained, no shared references.
    resources:
    - name: entities-items
      path: /entities/items
      operations:
      - name: createitem
        method: POST
        description: Wikidata Create a New Wikidata Item
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: entities-items-item_id
      path: /entities/items/{item_id}
      operations:
      - name: getitem
        method: GET
        description: Wikidata Get a Wikidata Item
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: patchitem
        method: PATCH
        description: Wikidata Update a Wikidata Item
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.WIKIDATA_API_KEY}}'
  exposes:
  - type: rest
    namespace: mediawiki-items-rest
    port: 8080
    description: REST adapter for Wikidata REST API & MediaWiki API — Items. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/entities/items
      name: entities-items
      description: REST surface for entities-items.
      operations:
      - method: POST
        name: createitem
        description: Wikidata Create a New Wikidata Item
        call: mediawiki-items.createitem
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/entities/items/{item-id}
      name: entities-items-item-id
      description: REST surface for entities-items-item_id.
      operations:
      - method: GET
        name: getitem
        description: Wikidata Get a Wikidata Item
        call: mediawiki-items.getitem
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: patchitem
        description: Wikidata Update a Wikidata Item
        call: mediawiki-items.patchitem
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mediawiki-items-mcp
    port: 9090
    transport: http
    description: MCP adapter for Wikidata REST API & MediaWiki API — Items. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: wikidata-create-new-wikidata-item
      description: Wikidata Create a New Wikidata Item
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: mediawiki-items.createitem
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: wikidata-get-wikidata-item
      description: Wikidata Get a Wikidata Item
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mediawiki-items.getitem
      outputParameters:
      - type: object
        mapping: $.
    - name: wikidata-update-wikidata-item
      description: Wikidata Update a Wikidata Item
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: mediawiki-items.patchitem
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
