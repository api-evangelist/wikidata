providerId: wikidata
publisherName: Wikimedia Foundation, Inc.
serviceCategory: Open Knowledge Graph
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Knowledge Graph
  - Linked Data
  - Open Data
  - SPARQL
  - FinOps
