description: 'FOCUS-aligned FinOps for Wikidata: the public APIs are zero-cost / CC0; consumer-side cost is the engineering effort and infrastructure spent fetching, caching, and re-hosting Wikidata content responsibly. Commercial-grade access is available separately through Wikimedia Enterprise and is the only path with a real invoice line.'
sources:
  - https://www.wikidata.org/wiki/Wikidata:Data_access
  - https://dumps.wikimedia.org
  - https://enterprise.wikimedia.com
billingModel:
  pricingCategory: Free / CC0 (Wikimedia Enterprise priced separately)
  billingFrequency: On-Demand
  billingCurrency: USD
  chargeCategories:
    - Usage
focusColumns:
  ServiceName: Wikidata
  ServiceCategory: Open Knowledge Graph
  ProviderName: Wikimedia Foundation
  PublisherName: Wikimedia Foundation, Inc.
  InvoiceIssuerName: Wikimedia Foundation, Inc.
  BillingCurrency: USD
meters:
  - name: sparql_queries
    unit: query
    aggregation: sum
    dimensions:
      - endpoint
      - client_ip
  - name: action_api_requests
    unit: request
    aggregation: sum
    dimensions:
      - module
      - client_ip
  - name: rest_api_requests
    unit: request
    aggregation: sum
    dimensions:
      - resource
      - client_ip
  - name: dump_downloads
    unit: GB
    aggregation: sum
    dimensions:
      - dump_type
  - name: event_stream_subscriptions
    unit: connection-hour
    aggregation: sum
    dimensions:
      - stream
principles:
  - name: Visibility
    description: There is no Wikimedia billing API for the free APIs; visibility is consumer-side - log SPARQL query runtimes, MediaWiki maxlag responses, and 429s to understand pressure on the shared infrastructure.
  - name: Allocation
    description: Allocate by surface (SPARQL vs Action vs REST vs dumps) since each surface has a different cost model for the consumer (live latency vs bulk-mirror vs streaming).
  - name: Optimization
    description: 'Optimization is etiquette: cache aggressively, prefer dumps for bulk reads, send maxlag and a descriptive User-Agent, and avoid running long SPARQL queries near the 60s timeout.'
  - name: Accountability
    description: Engineering owns User-Agent compliance and dump-mirroring strategy; if a use case requires SLAs, accountability for that spend shifts to procurement via Wikimedia Enterprise.
maintainers:
