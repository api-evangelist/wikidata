  https://raw.githubusercontent.com/api-evangelist/wikidata/refs/heads/main/apis.yml
specificationVersion: '0.19'
apis:
  - aid: wikidata:wikibase-rest-api
    name: Wikibase REST API
    description: >-
      The Wikibase REST API provides OpenAPI-based read and write operations for Wikidata
      entities (items and properties), including labels, descriptions, aliases, statements,
      sitelinks, and patches. Authentication via OAuth2 or MediaWiki session is required
      for write operations.
    humanURL: https://www.wikidata.org/wiki/Wikidata:REST_API
    baseURL: https://www.wikidata.org/w/rest.php/wikibase/v0
    tags:
      - Knowledge Graph
      - Entities
      - Items
      - Properties
      - Statements
      - Linked Data
    properties:
      - type: Documentation
        url: https://www.wikidata.org/wiki/Wikidata:REST_API
      - type: OpenAPI
        url: https://raw.githubusercontent.com/api-evangelist/wikidata/refs/heads/main/openapi/wikidata-mediawiki-openapi.yml
      - type: JSONSchema
        url: https://raw.githubusercontent.com/api-evangelist/wikidata/refs/heads/main/json-schema/wikidata-entity-schema.json
      - type: JSON-LD
        url: https://raw.githubusercontent.com/api-evangelist/wikidata/refs/heads/main/json-ld/wikidata-context.jsonld

  - aid: wikidata:mediawiki-action-api
    name: MediaWiki Action API
    description: >-
      The MediaWiki Action API provides batch entity retrieval, editing, and search for
      Wikidata via wbgetentities, wbsearchentities, wbeditentity, and other actions.
      Supports up to 50 entities per request. Accessible at wikidata.org/w/api.php.
    humanURL: https://www.mediawiki.org/wiki/Wikibase/API
    baseURL: https://www.wikidata.org/w/api.php
    tags:
      - MediaWiki
      - Batch Operations
      - Entity Retrieval
      - Search
    properties:
      - type: Documentation
        url: https://www.mediawiki.org/wiki/Wikibase/API
      - type: SDK
        url: https://pypi.org/project/pywikibot/
        title: Pywikibot (Python)
      - type: SDK
        url: https://www.npmjs.com/package/wikibase-sdk
        title: wikibase-sdk (JavaScript)
      - type: SDK
        url: https://www.wikidata.org/wiki/Wikidata:Tools/Wikidata_Toolkit
        title: Wikidata Toolkit (Java)

  - aid: wikidata:sparql-query-service
    name: SPARQL Query Service
    description: >-
      The Wikidata Query Service provides a SPARQL 1.1 endpoint at query.wikidata.org
      for running complex graph queries over the full Wikidata knowledge base. Supports
      federated queries, GeoSPARQL, and time-aware queries. Data is CC0 licensed.
    humanURL: https://www.wikidata.org/wiki/Wikidata:SPARQL_query_service
    baseURL: https://query.wikidata.org/sparql
    tags:
      - SPARQL
      - Graph Query
      - Linked Data
      - Open Data
    properties:
      - type: Documentation
        url: https://www.mediawiki.org/wiki/Wikidata_Query_Service/User_Manual
      - type: APIReference
        url: https://www.wikidata.org/wiki/Wikidata:SPARQL_query_service/queries/examples

  - aid: wikidata:linked-data-interface
    name: Linked Data Interface
    description: >-
      The Wikidata Linked Data Interface provides individual entity data via content
      negotiation at http://www.wikidata.org/entity/{QID}. Supports JSON, JSON-LD,
      RDF/XML, Turtle, and N-Triples output formats. No authentication required.
    humanURL: https://www.wikidata.org/wiki/Wikidata:Data_access#Linked_Data_Interface
    baseURL: https://www.wikidata.org/entity
    tags:
      - Linked Data
      - RDF
      - JSON-LD
      - Content Negotiation
    properties:
      - type: Documentation
        url: https://www.wikidata.org/wiki/Wikidata:Data_access#Linked_Data_Interface

  - aid: wikidata:event-stream
    name: Recent Changes Event Stream
    description: >-
      The Wikimedia Event Stream provides real-time Server-Sent Events (SSE) for
      Wikidata changes, revision creations, and page events. Available at
      stream.wikimedia.org. Ideal for monitoring Wikidata edits in near-real-time.
    humanURL: https://wikitech.wikimedia.org/wiki/Event_Platform/EventStreams
    baseURL: https://stream.wikimedia.org/v2/stream
    tags:
      - Event Streaming
      - Real-time
      - Server-Sent Events
      - Change Detection
    properties:
      - type: Documentation
        url: https://wikitech.wikimedia.org/wiki/Event_Platform/EventStreams

