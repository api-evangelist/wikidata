aid: wikidata
name: Wikidata
description: >-
  Wikidata is a free, collaborative, multilingual knowledge graph hosted by the Wikimedia
  Foundation. It provides structured linked data for Wikipedia and other Wikimedia projects,
  as well as a public platform for anyone to read and edit. Wikidata exposes several APIs
  including a Wikibase REST API for entity read/write operations, the MediaWiki Action API
  for batch entity retrieval and editing, a SPARQL endpoint for complex graph queries,
  Linked Data URIs for individual entity access in multiple RDF formats, a real-time
  Server-Sent Events stream for change monitoring, and full database dumps for bulk
  data processing.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Knowledge Graph
  - Linked Data
  - Open Data
  - Semantic Web
  - SPARQL
  - Wikipedia
created: '2025-01-01'
modified: '2026-05-03'
